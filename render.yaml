# https://render.com/docs/blueprint-spec
# После пуша в GitHub: New → Blueprint → выбрать репозиторий.
services:
  - type: web
    name: vk-moderation-sheets
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
